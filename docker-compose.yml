services:
  # 判题服务
  judgend:
    build: ./services/judgend
    # 判题端不需要暴露端口到外部，仅内部互访
    environment:
      - AIJ_MAX_CONCURRENT_REQUESTS=${JUDGEND_MAX_CONCURRENT_REQUESTS}
      - AIJ_BACKEND_HOST=backend
      - AIJ_OUTPUT_TRUNCATE_LENGTH=${JUDGEND_OUTPUT_TRUNCATE_LENGTH}
    volumes:
      - ./data/judgend:/app/assets
    # Agent
  agentend:
    build: ./services/seuoj-qa
    volumes:
      - ./agent_config.yaml:/app/config/base.yaml:ro
      - ./data/agent:/app/data
  # 数据库服务
  mysql:
    image: mysql:8.0
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD}
      - MYSQL_DATABASE=seuoj
    volumes:
      - ./data/mysql:/var/lib/mysql
      - ./data/init:/docker-entrypoint-initdb.d/:ro
      - ./data/init/my.cnf:/etc/mysql/conf.d/my.cnf:ro

  # 后端服务
  backend:
    build: ./services/backend
    environment:
      # 应用配置
      - SPRING_APPLICATION_NAME=seuoj-backend
      - SPRING_PROFILES_ACTIVE=dev
      - LOGGING_FILE_NAME=/app/log/backend.log
      - LOGGING_LOGBACK_ROLLINGPOLICY_MAX_FILE_SIZE=10MB
      - LOGGING_LOGBACK_ROLLINGPOLICY_MAX_HISTORY=7
      - SPRING_JACKSON_TIME_ZONE=Asia/Shanghai
      - SPRING_JACKSON_DATE_FORMAT=yyyy-MM-dd HH:mm:ss
      # 数据库配置
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/seuoj?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=${DB_ROOT_PASSWORD}
      - SPRING_DATASOURCE_DRIVER_CLASS_NAME=com.mysql.cj.jdbc.Driver
      # 邮件配置
      - SPRING_MAIL_HOST=smtp.qq.com
      - SPRING_MAIL_PORT=465
      - SPRING_MAIL_USERNAME=${MAIL_USERNAME}
      - SPRING_MAIL_PASSWORD=${MAIL_PASSWORD}
      - SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH=true
      - SPRING_MAIL_PROPERTIES_MAIL_SMTP_SSL_ENABLE=true
      # 代码存储配置
      - STORAGE_USER_CODE_STORAGE_PATH=/app/data/user-code
      # MyBatis Plus 配置
      - MYBATIS_PLUS_CONFIGURATION_MAP_UNDERSCORE_TO_CAMEL_CASE=true
      - MYBATIS_PLUS_GLOBAL_CONFIG_DB_CONFIG_LOGIC_DELETE_FIELD=is_del
      - MYBATIS_PLUS_GLOBAL_CONFIG_DB_CONFIG_LOGIC_DELETE_VALUE=1
      - MYBATIS_PLUS_GLOBAL_CONFIG_DB_CONFIG_LOGIC_NOT_DELETE_VALUE=0
      - MYBATIS_PLUS_MAPPER_LOCATIONS=classpath:/mapper/**/*.xml
      - MYBATIS_PLUS_LOG_IMPL=org.apache.ibatis.logging.stdout.StdOutImpl
      # JWT 配置
      - JWT_PRIVATE_KEY=${JWT_PRIVATE_KEY}
      - JWT_PUBLIC_KEY=${JWT_PUBLIC_KEY}
      - JWT_ACCESS_EXPIRATION=${JWT_ACCESS_EXPIRATION}
      - JWT_TEMP_EXPIRATION=${JWT_TEMP_EXPIRATION}
      # 评测服务配置
      - JUDGE_SERVER_URL=http://judgend:9090
      - JUDGE_SECRET=${JUDGE_SECRET}
      # 评测服务测试用例配置
      - PROBLEM_TESTCASE_MAX_ARCHIVE_SIZE=52428800
      - PROBLEM_TESTCASE_MAX_ENTRY_COUNT=200
      - PROBLEM_TESTCASE_MAX_ENTRY_SIZE=5242880
      - PROBLEM_TESTCASE_MAX_TOTAL_SIZE=209715200
      - PROBLEM_TESTCASE_MAX_COMPRESSION_RATIO=50
      - PROBLEM_TESTCASE_MAX_TEXT_SIZE=5242880
      - PROBLEM_TESTCASE_MAX_LINE_LENGTH=200000
      # 验证码配置
      - VERIFICATION_CODE_EXPIRE_SECONDS=300
      - VERIFICATION_SEND_INTERVAL_SECONDS=60
      - VERIFICATION_CACHE_MAX_SIZE=10000
      - VERIFICATION_MAX_VERIFY_FAILS=5
      - VERIFICATION_DEV_FIXED_CODE_ENABLED=${VERIFICATION_DEV_FIXED_CODE_ENABLED}
      - VERIFICATION_DEV_FIXED_CODE=${VERIFICATION_DEV_FIXED_CODE}
      # 文件上传配置
      - STORAGE_UPLOAD_PATH=/app/data/uploads
      - STORAGE_UPLOAD_MAX_FILE_SIZE=209715200
      - SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE=200MB
      - SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE=500MB
    depends_on:
      - mysql
    volumes:
      - ./data/backend/log:/app/log
      - ./data/backend/data:/app/data

  # 前端 + Nginx
  frontend:
    build: ./services/frontend
    depends_on:
      - backend
      - judgend
      - agentend
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "2280:80"
      - "443:443"
